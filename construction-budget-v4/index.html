<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Construction Budget Spreadsheet</title>
  <!-- Retail 2.0 design tokens — must be defined before Tailwind CDN initializes -->
  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Manrope', 'Arial', 'Helvetica', 'sans-serif'],
            },
            colors: {
              brand: {
                50:  '#E5E9FF',
                100: '#CCD4FF',
                200: '#BEC6ED',
                300: '#78819D',
                400: '#4A5580',
                500: '#1C39D8',
                600: '#142BB9',
                700: '#1E2D5C',
                800: '#16225A',
                900: '#0E1840',
              },
              'r2-bg':         '#F4F5F7',
              'r2-card':       '#F6F7F9',
              'r2-hover':      '#F7F9FC',
              'r2-dark-hover': '#EBEDF2',
              'r2-border':     '#DFE1E5',
              'r2-disabled':   '#BCBFC7',
              'r2-navy':       '#1E2D5C',
              'r2-navy-sec':   '#78819D',
              'r2-green':      '#139B23',
              'r2-warning':    '#EAA800',
              'r2-error':      '#B92814',
            }
          }
        }
      }
    };
  </script>
  <!-- Tailwind CDN is now injected by index.tsx if missing, but kept here for dev speed -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Shepherd.js CSS injected by index.tsx if missing -->
  <!-- SheetJS library for parsing .xlsx files -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "shepherd.js": "https://cdn.jsdelivr.net/npm/shepherd.js@10.0.1/+esm",
    "@google/genai": "https://esm.sh/@google/genai",
    "vite": "https://aistudiocdn.com/vite@^7.2.4",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "path": "https://aistudiocdn.com/path@^0.12.7",
    "url": "https://aistudiocdn.com/url@^0.11.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <!-- Widget Container for Style Isolation -->
  <div id="construction-budget-app"></div>
  <script type="module" src="/index.tsx"></script>
  <!-- Auto-initialize the widget for standalone preview -->
  <script>
    window.addEventListener('load', () => {
      if (window.ConstructionBudget) {
        window.ConstructionBudget.mount();
      }
    });
  </script>
</body>
</html>
